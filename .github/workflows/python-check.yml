name: Python checks

on:
  push:
  pull_request:

jobs:
  syntax-and-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python sources
        run: python -m compileall -q audiotext main.pyw tests
